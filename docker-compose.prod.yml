version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: cms-db
    restart: always
    env_file: .env.prod
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 3s
      retries: 30

  app:
    build: .
    container_name: cms-app
    restart: always
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: cms-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  db_data: