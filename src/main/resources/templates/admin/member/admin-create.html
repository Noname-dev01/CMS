<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: adminHead}">
    <title>관리자 계정 생성</title>
</head>
<body id="page-top">
<link rel="stylesheet" th:href="@{/css/admin/admin-create.css}">

<div id="wrapper">
    <div th:replace="~{admin/fragments/sidebar :: adminSidebar}"></div>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{admin/fragments/topbar :: adminTopbar}"></div>

            <div class="container-fluid">
                <div class="d-sm-flex align-items-center justify-content-between mb-4">
                    <h1 class="h3 mb-0 text-gray-800">관리자 계정 생성</h1>
                </div>

                <div class="admin-create-shell">
                    <div class="card shadow mb-4 admin-create-card">
                        <div class="admin-create-head">
                            <h6 class="m-0 font-weight-bold">관리자 정보 입력</h6>
                            <p class="sub">필수 입력값을 모두 입력해 관리자 계정을 생성하세요.</p>
                        </div>

                        <div class="card-body">
                            <div id="formAlert" class="alert alert-danger d-none" role="alert"></div>

                            <form id="adminCreateForm">
                                <div class="form-block">
                                    <div class="form-block-title">기본 정보</div>
                                    <div class="form-row">
                                        <div class="form-group col-md-6">
                                            <label class="form-label" for="userName">이름</label>
                                            <input type="text" class="form-control" id="userName" maxlength="100" required>
                                        </div>
                                        <div class="form-group col-md-6">
                                            <label class="form-label" for="email">이메일</label>
                                            <input type="email" class="form-control" id="email" maxlength="100" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-block">
                                    <div class="form-block-title">로그인 정보</div>
                                    <div class="form-group">
                                        <label class="form-label" for="userId">아이디</label>
                                        <input type="text" class="form-control" id="userId" maxlength="50" required>
                                        <div class="form-help">영문/숫자 4~50자 입력을 권장합니다.</div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col-md-6">
                                            <label class="form-label" for="pwd">비밀번호</label>
                                            <input type="password" class="form-control" id="pwd" required>
                                        </div>
                                        <div class="form-group col-md-6">
                                            <label class="form-label" for="confirmPwd">비밀번호 확인</label>
                                            <input type="password" class="form-control" id="confirmPwd" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-block mb-0">
                                    <div class="form-block-title">권한 설정</div>
                                    <div class="form-group mb-0">
                                        <label class="form-label" for="userType">권한</label>
                                        <select class="form-control" id="userType">
                                            <option value="ROLE_ADMIN" selected>관리자</option>
                                            <option value="ROLE_MANAGER">매니저</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-actions mt-3">
                                    <button type="button" id="btnReset" class="btn btn-light border">초기화</button>
                                    <button type="submit" class="btn btn-primary">생성</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{admin/fragments/footer :: adminFooter}"></div>
    </div>
</div>

<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/vendor/jquery-easing/jquery.easing.min.js"></script>
<script src="/js/sb-admin-2.min.js"></script>

<script>
    const form = document.getElementById("adminCreateForm");
    const resetButton = document.getElementById("btnReset");
    const formAlert = document.getElementById("formAlert");

    function showError(message) {
        formAlert.textContent = message;
        formAlert.classList.remove("d-none");
    }

    function hideError() {
        formAlert.classList.add("d-none");
        formAlert.textContent = "";
    }

    resetButton.addEventListener("click", function () {
        form.reset();
        hideError();
    });

    form.addEventListener("submit", async function (event) {
        event.preventDefault();
        hideError();

        const pwd = document.getElementById("pwd").value;
        const confirmPwd = document.getElementById("confirmPwd").value;

        if (pwd !== confirmPwd) {
            showError("비밀번호 확인 값이 일치하지 않습니다.");
            return;
        }

        const payload = {
            userId: document.getElementById("userId").value.trim(),
            pwd: pwd,
            userName: document.getElementById("userName").value.trim(),
            email: document.getElementById("email").value.trim(),
            userType: document.getElementById("userType").value
        };

        try {
            const response = await fetch("/admin/api/member", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("관리자 계정이 생성되었습니다.");
                form.reset();
                hideError();
                return;
            }

            const errorBody = await response.json().catch(() => ({}));
            const message = errorBody.message || "관리자 계정 생성에 실패했습니다.";
            showError(message);
        } catch (e) {
            showError("요청 처리 중 오류가 발생했습니다.");
        }
    });
</script>

</body>
</html>
