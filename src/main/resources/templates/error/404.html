<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p class="error-message">죄송합니다. 요청하신 페이지를 찾을 수 없습니다.</p>
        <p class="error-description">페이지가 이동되었거나 삭제되었을 수 있습니다.</p>
        <a th:href="@{/}" class="home-button">홈으로 돌아가기</a>
        <div class="error-details" th:if="${timestamp}">
            <p>오류 발생 시간: <span th:text="${#dates.format(timestamp, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
        </div>
    </div>
</body>
</html>
