server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3307/cms}
    username: ${DB_USER:admin}
    password: ${DB_PASS:1234}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    user:
      name: admin
      password: 1234
      roles: ADMIN

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER:your-email@gmail.com}
    password: ${MAIL_PASS:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false