server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3307/cms}
    username: ${DB_USER:admin}
    password: ${DB_PASS}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false