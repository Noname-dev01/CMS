version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: cms-db-dev
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "3307:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build: .
    container_name: cms-app-dev
    restart: unless-stopped
    env_file: .env.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  db_data_dev: